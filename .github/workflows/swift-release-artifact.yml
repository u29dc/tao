name: swift-release-artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-macos-app:
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: build bridge release binary
        run: cargo build --release -p tao-sdk-bridge

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: swift test
        run: swift test --configuration release
        working-directory: apps/tao-macos

      - name: build signed app bundle
        run: ./scripts/package.sh

      - name: upload signed app artifact
        uses: actions/upload-artifact@v4
        with:
          name: tao-macos-signed-app
          path: |
            dist/TaoMacOSApp.app
            dist/TaoMacOSApp-macos-signed.zip
