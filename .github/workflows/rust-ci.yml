name: rust-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: types
        run: cargo check --workspace --release

      - name: test
        run: cargo test --workspace --release

      - name: perf budget gate
        run: ./scripts/bench.sh --suite sdk

      - name: upload perf reports
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: |
            .benchmarks/reports/bridge-call-budgets.json
            .benchmarks/reports/ffi-call-budgets.json
            .benchmarks/reports/startup-budgets.json
            .benchmarks/reports/parse-bench.json
            .benchmarks/reports/resolve-bench.json
            .benchmarks/reports/search-bench.json
            .benchmarks/reports/query-docs-hyperfine.json
            .benchmarks/reports/graph-unresolved-hyperfine.json

      - name: build
        run: cargo build --workspace --release
