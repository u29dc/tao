name: rust-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: format
        run: cargo fmt --all -- --check

      - name: lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: types
        run: cargo check --workspace --release

      - name: test
        run: cargo test --workspace --release

      - name: generate synthetic fixtures
        run: ./scripts/fixtures.sh --profile 10k --output vault/generated

      - name: phase23 perf scenarios
        run: ./scripts/bench.sh --suite sdk --profile 10k --runs 8 --warmup 2 --skip-generate

      - name: phase23 read budgets
        run: ./scripts/budgets.sh --profile 10k --runs 8 --warmup 2 --skip-generate

      - name: upload perf reports
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: |
            .benchmarks/reports/**

      - name: build
        run: cargo build --workspace --release
